# Shulang CI: multi-platform build and full test suite
# Linux (multi-version), Linux ARM64, macOS (multi-version), Windows, Docker multi-distro (Alpine/Debian).
# Build: shuc (C-only) + shuc_su + bootstrap-driver. After bootstrap-driver we save driver as shuc_driver and set compiler/shuc=shuc-c so run-all uses C-only for run-lexer..run-asm; run-all switches to shuc_driver only for run-without-c, then restores shuc-c for run-vector etc.
# Bootstrap verify (two-stage shuc) disabled for now; run locally with ./tests/run-bootstrap-verify.sh when needed.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a
          pwd && ls -la
          which cc make 2>/dev/null || true
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Build shuc_su (bootstrap-pipeline + shuc-su-pipeline)
        run: make -C compiler bootstrap-pipeline && make -C compiler shuc-su-pipeline
        timeout-minutes: 5
      - name: Build bootstrap-driver (shuc with -backend asm; save as shuc_driver, use shuc-c for run-all)
        run: make -C compiler bootstrap-driver && cp compiler/shuc compiler/shuc_driver && cp compiler/shuc-c compiler/shuc
        timeout-minutes: 5
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        timeout-minutes: 20

  linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | Linux ARM64"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Build shuc_su (bootstrap-pipeline + shuc-su-pipeline)
        run: make -C compiler bootstrap-pipeline && make -C compiler shuc-su-pipeline
        timeout-minutes: 5
      - name: Build bootstrap-driver (shuc with -backend asm; save as shuc_driver, use shuc-c for run-all)
        run: make -C compiler bootstrap-driver && cp compiler/shuc compiler/shuc_driver && cp compiler/shuc-c compiler/shuc
        timeout-minutes: 5
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        timeout-minutes: 20

  mac:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Build shuc_su (bootstrap-pipeline + shuc-su-pipeline)
        run: make -C compiler bootstrap-pipeline && make -C compiler shuc-su-pipeline
        timeout-minutes: 5
      - name: Build bootstrap-driver (shuc with -backend asm; save as shuc_driver, use shuc-c for run-all)
        run: make -C compiler bootstrap-driver && cp compiler/shuc compiler/shuc_driver && cp compiler/shuc-c compiler/shuc
        timeout-minutes: 5
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        timeout-minutes: 20

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $env:RUNNER_OS | Job: Windows"
          Get-Location
        shell: pwsh
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: make gcc diffutils python3 sed gawk
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        shell: msys2 {0}
        env:
          CC: gcc
      - name: Build shuc_su (bootstrap-pipeline + shuc-su-pipeline)
        run: make -C compiler bootstrap-pipeline && make -C compiler shuc-su-pipeline
        shell: msys2 {0}
        timeout-minutes: 5
      - name: Build bootstrap-driver (shuc with -backend asm; save as shuc_driver, use shuc-c for run-all)
        run: make -C compiler bootstrap-driver && cp compiler/shuc compiler/shuc_driver && cp compiler/shuc-c compiler/shuc
        shell: msys2 {0}
        timeout-minutes: 5
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        shell: msys2 {0}
        timeout-minutes: 20
        env:
          CI: "1"

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:latest, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Job: Docker ${{ matrix.image }}"
          uname -a
          pwd
      - name: Build and test in ${{ matrix.image }}
        timeout-minutes: 25
        run: |
          docker run --rm -e CI=1 \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache build-base bash diffutils python3 gawk
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils python3
              fi &&
              make -C compiler clean &&
              make -C compiler OPT=1 &&
              make -C compiler bootstrap-pipeline && make -C compiler shuc-su-pipeline &&
              make -C compiler bootstrap-driver && cp compiler/shuc compiler/shuc_driver && cp compiler/shuc-c compiler/shuc &&
              ./tests/run-all.sh
            '
