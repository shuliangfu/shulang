# Shulang CI：多端构建与全量测试
# 在 push/PR 时于 Linux、macOS、Windows 上分别构建 compiler（C 版 shuc）并执行 tests/run-all.sh。
# Linux/macOS：系统 cc（gcc/clang）、make、bash。Windows：使用 MSYS2 提供 bash/make/gcc（不依赖 WSL）。

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: make gcc diffutils
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        shell: msys2 {0}
        env:
          CC: gcc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        shell: msys2 {0}
