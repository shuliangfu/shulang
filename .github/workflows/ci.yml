# Shulang CI: multi-platform build and C test suite only
# Linux (multi-version), Linux ARM64, macOS (multi-version), Windows, Docker multi-distro (Alpine/Debian).
# Build: shuc (C compiler). Test: run-all.sh (full run-*.sh suite with compiler/shuc). No bootstrap / shuc_su / run-all-su.sh; run those locally when needed.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a
          pwd && ls -la
          which cc make 2>/dev/null || true
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Verify compiler/shuc was built
        run: |
          if [ ! -f compiler/shuc ] || [ ! -x compiler/shuc ]; then
            echo "::error::compiler/shuc not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        timeout-minutes: 20

  linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (liburing, zlib, brotli for std/io and std/compress)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq liburing-dev zlib1g-dev libbrotli-dev
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | Linux ARM64"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Verify compiler/shuc was built
        run: |
          if [ ! -f compiler/shuc ] || [ ! -x compiler/shuc ]; then
            echo "::error::compiler/shuc not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        timeout-minutes: 20

  mac:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies (brotli for std/compress .br)
        run: brew install brotli
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $RUNNER_OS | ${{ matrix.os }}"
          uname -a && pwd && which cc make 2>/dev/null || true
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Verify compiler/shuc was built
        run: |
          if [ ! -f compiler/shuc ] || [ ! -x compiler/shuc ]; then
            echo "::error::compiler/shuc not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        timeout-minutes: 20

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Runner OS: $env:RUNNER_OS | Job: Windows"
          Get-Location
        shell: pwsh
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: make gcc diffutils python3 sed gawk zlib-devel brotli
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        shell: msys2 {0}
        env:
          CC: gcc
      - name: Verify compiler/shuc was built
        run: |
          if [ ! -f compiler/shuc ] || [ ! -x compiler/shuc ]; then
            echo "::error::compiler/shuc not found or not executable (Build compiler step did not produce it)"
            exit 1
          fi
        shell: msys2 {0}
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        shell: msys2 {0}
        timeout-minutes: 20
        env:
          CI: "1"

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:latest, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show job env (debug)
        run: |
          echo "Job: Docker ${{ matrix.image }}"
          uname -a
          pwd
      - name: Build and test in ${{ matrix.image }}
        timeout-minutes: 25
        run: |
          docker run --rm -e CI=1 \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache build-base bash diffutils python3 gawk linux-headers liburing-dev zlib-dev brotli-dev
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils python3 liburing-dev zlib1g-dev libbrotli-dev
              fi &&
              make -C compiler clean &&
              make -C compiler OPT=1 &&
              ./tests/run-all.sh
            '
