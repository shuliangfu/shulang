# Shulang CI: multi-platform build and full test suite
# Linux (multi-version), Linux ARM64, macOS (multi-version), Windows, Docker multi-distro (Alpine/Debian).
# Regular test jobs: make -C compiler OPT=1 produces C-only shuc (default target); run-all.sh uses it when SHUC is unset; full test pass means CI pass.
# Bootstrap verify: runs two-stage bootstrap shuc (main.su driver) full test and records binary hashes; on failure see step "Dump bootstrap test logs".

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bootstrap-verify:
    name: Bootstrap verify (shuc1 -> shuc2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Bootstrap verify (two-stage shuc full test)
        run: ./tests/run-bootstrap-verify.sh
      - name: Record shuc hashes (bootstrap verify passed, record binary hashes)
        run: |
          echo "## Bootstrap verify OK" >> $GITHUB_STEP_SUMMARY
          if [ -f compiler/shuc_stage1 ]; then
            echo "- \`shuc_stage1\` (shuc1): \`$(sha256sum compiler/shuc_stage1 | cut -d' ' -f1)\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f compiler/shuc_stage2 ]; then
            echo "- \`shuc_stage2\` (shuc2): \`$(sha256sum compiler/shuc_stage2 | cut -d' ' -f1)\`" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Dump bootstrap test logs (on failure; check-7.2 writes run-all output to /tmp/run_shuc1.log, run_shuc2.log)
        if: failure()
        run: |
          echo "=== run_shuc1.log (last 120 lines) ==="
          tail -120 /tmp/run_shuc1.log 2>/dev/null || true
          echo "=== run_shuc2.log (last 120 lines) ==="
          tail -120 /tmp/run_shuc2.log 2>/dev/null || true

  linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  mac:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: make gcc diffutils
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        shell: msys2 {0}
        env:
          CC: gcc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        shell: msys2 {0}

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:latest, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and test in ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache build-base bash diffutils
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils
              fi &&
              make -C compiler clean &&
              make -C compiler OPT=1 &&
              ./tests/run-all.sh
            '
