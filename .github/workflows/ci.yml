# Shulang CI：多端构建与全量测试
# Linux（多版本）、Linux ARM64、macOS（多版本）、Windows、Docker 多发行版（Alpine/Debian）。

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  linux-arm64:
    name: Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  mac:
    name: macOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        env:
          CC: cc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: make gcc diffutils
      - name: Build compiler (shuc)
        run: make -C compiler OPT=1
        shell: msys2 {0}
        env:
          CC: gcc
      - name: Run full test suite (run-all.sh)
        run: ./tests/run-all.sh
        shell: msys2 {0}

  docker-distro:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ alpine:latest, debian:bookworm-slim ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and test in ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" -w /src \
            ${{ matrix.image }} \
            sh -c '
              if command -v apk >/dev/null 2>&1; then
                apk add --no-cache make gcc bash diffutils
              else
                apt-get update -qq && apt-get install -y -qq build-essential bash diffutils
              fi &&
              make -C compiler OPT=1 &&
              ./tests/run-all.sh
            '
